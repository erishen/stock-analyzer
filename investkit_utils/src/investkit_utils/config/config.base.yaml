# InvestKit 基础配置
# 所有项目共享的默认配置

app:
  name: "investkit"
  version: "1.0.0"
  debug: false
  environment: "development"

logging:
  level: "INFO"
  format: "json"
  output:
    console: true
    file: false
    path: "logs/app.log"
  rotation:
    enabled: true
    max_bytes: 10485760
    backup_count: 5
  fields:
    include_timestamp: true
    include_level: true
    include_module: true
    include_correlation_id: true

database:
  type: "sqlite"
  sqlite:
    path: "data/app.db"
  postgresql:
    host: "localhost"
    port: 5432
    name: "investkit"
    user: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"
  pool:
    size: 5
    max_overflow: 10
    pool_timeout: 30

cache:
  enabled: true
  type: "memory"
  ttl: 3600
  redis:
    host: "localhost"
    port: 6379
    db: 0
    password: "${REDIS_PASSWORD}"

api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  cors:
    enabled: true
    origins: ["*"]
    methods: ["GET", "POST", "PUT", "DELETE"]
    headers: ["*"]
  rate_limit:
    enabled: true
    requests_per_minute: 60
  docs:
    enabled: true
    path: "/docs"
    redoc_path: "/redoc"

llm:
  default_provider: "ollama"
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4"
    temperature: 0.7
    max_tokens: 2000
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    model: "claude-3-opus-20240229"
    temperature: 0.7
    max_tokens: 2000
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3"
    temperature: 0.7

data_sources:
  akshare:
    enabled: true
    retry_count: 3
    retry_delay: 1
    timeout: 30
  alpha_vantage:
    enabled: false
    api_key: "${ALPHA_VANTAGE_API_KEY}"
    rate_limit: 5

ml:
  model_path: "models/"
  features:
    count: 51
    cache_enabled: true
  training:
    test_size: 0.2
    cross_validation: 5
    random_state: 42
  prediction:
    batch_size: 100
    confidence_threshold: 0.6

monitoring:
  metrics:
    enabled: true
    port: 9090
  health_check:
    enabled: true
    path: "/health"
  tracing:
    enabled: false
    sample_rate: 0.1

security:
  api_key:
    header_name: "X-API-Key"
    enabled: false
  jwt:
    enabled: false
    secret: "${JWT_SECRET}"
    algorithm: "HS256"
    expire_minutes: 60
